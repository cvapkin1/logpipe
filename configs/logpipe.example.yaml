# logpipe example configuration
# --------------------------------
# Sources define where log lines are ingested from.
sources:
  - name: stdin
    type: stdin

  - name: app-tcp
    type: tcp
    address: ":5170"

# Sinks define where log lines are forwarded to.
sinks:
  - name: stdout
    type: stdout

  - name: remote
    type: tcp
    address: "logs.example.com:5171"

# Routes wire sources to sinks with optional filter rules.
routes:
  - source: stdin
    destination: stdout
    filters:
      - min_level: info

  - source: app-tcp
    destination: remote
    filters:
      - min_level: warn
      - contains: "ERROR"

# Rate limiting controls maximum log lines forwarded per second
# per route. Excess lines are dropped and counted in metrics.
rate_limiting:
  enabled: true
  default_rate: 1000        # lines per second
  default_interval: "1s"   # window duration (Go duration string)

  # Per-route overrides (matched by source name)
  overrides:
    - source: app-tcp
      rate: 500
      interval: "1s"

# Global pipeline settings
pipeline:
  buffer_capacity: 4096
  backpressure:
    max_retries: 3
    retry_delay: "50ms"
